<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="calculator">
        <div class="calculator__display">0</div>

        <div class="calculator__keys">
            <button data-action="clear" class="key--clear">AC</button>
            <button data-action="divide">÷</button>
            <button data-action="multiply">×</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button data-action="subtract">-</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button data-action="add">+</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button data-action="calculate" class="key--equal">=</button>
            
            <button class="key--zero">0</button>
            <button data-action="decimal">.</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
